spring:
  application:
    name: enterprise-digital-wallet

  # ─── JPA ────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: false
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
    open-in-view: false

  # ─── LIQUIBASE ───────────────────────────────────────────────────────────────
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  # ─── CACHE ───────────────────────────────────────────────────────────────────
  cache:
    type: redis

  # ─── REDIS ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms

  # ─── JACKSON ─────────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# ─── SERVER ──────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  error:
    include-message: never
    include-stacktrace: never

# ─── ACTUATOR / METRICS ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# ─── SPRINGDOC / SWAGGER ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# ─── APPLICATION CUSTOM PROPERTIES ───────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:MyS3cur3JwtS3cr3tK3yF0rEnterpr1seD1g1talWall3t2024!}
    access-token-expiration-ms: 900000          # 15 minutes
    refresh-token-expiration-ms: 604800000       # 7 days

  encryption:
    secret-key: ${ENCRYPTION_KEY:EnterpriseWallet256BitAESKeyForPCI-DSS!2024}
    salt: ${ENCRYPTION_SALT:WalletSalt2024!}

  rate-limit:
    capacity: 100
    refill-tokens: 100
    refill-duration-seconds: 60

  cors:
    allowed-origins: http://localhost:4200,http://localhost:3000,${FRONTEND_URL:http://localhost:4200}

  async:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 500

  wallet:
    default-currency: INR
    min-balance: 0.00
    max-daily-transfer: 100000.00
