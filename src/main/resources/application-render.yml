spring:
  config:
    activate:
      on-profile: render

  # ─── PostgreSQL Production DB (Render) ──────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false

  # ─── Redis (Render) ────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:true}
      timeout: 2000ms

  # ─── Liquibase ──────────────────────────────────────────────────────────────
  liquibase:
    enabled: true
    contexts: prod

logging:
  level:
    com.enterprise.wallet: INFO
    org.springframework.security: WARN
