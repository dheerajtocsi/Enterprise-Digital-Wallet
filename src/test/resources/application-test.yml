spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  cache:
    type: none

app:
  jwt:
    secret: TestJwtSecretKey12345678901234567890ForUnitTests
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  encryption:
    secret-key: TestEncryptionKey32BytesLongForTests!
    salt: TestSalt!
  cors:
    allowed-origins:
      - http://localhost:4200
