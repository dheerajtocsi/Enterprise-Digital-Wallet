services:
  # ─── Backend Service (Spring Boot) ──────────────────────────────────
  - type: web
    name: enterprise-wallet-api
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: enterprise-wallet-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: enterprise-wallet-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: enterprise-wallet-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: enterprise-wallet-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: enterprise-wallet-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ENCRYPTION_SALT
        generateValue: true

  # ─── Frontend Service (Angular Static Site) ────────────────────────
  - type: web
    name: enterprise-wallet-ui
    runtime: static
    rootDir: wallet-ui
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist/wallet-ui/browser"
    headers:
      - path: "/*"
        name: Cache-Control
        value: "max-age=31536000"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: enterprise-wallet-db
    plan: free
    databaseName: walletdb
    user: wallet_user
