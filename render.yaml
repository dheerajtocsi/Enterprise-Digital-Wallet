services:
  # ─── Backend Service (Spring Boot) ──────────────────────────────────
  - type: web
    name: enterprise-wallet-api
    runtime: java
    plan: free
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/*.jar --spring.profiles.active=render"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: enterprise-wallet-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ENCRYPTION_SALT
        generateValue: true

  # ─── Frontend Service (Angular Static Site) ────────────────────────
  - type: web
    name: enterprise-wallet-ui
    runtime: static
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: "wallet-ui/dist/wallet-ui/browser"
    headers:
      - path: "/*"
        name: Cache-Control
        value: "max-age=31536000"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: enterprise-wallet-db
    plan: free
    databaseName: walletdb
    user: wallet_user
